version: '3.8'

services:
  # 1. BASE DE DATOS
  postgres_db:
    image: postgres:15-alpine
    container_name: postgres_container
    restart: always
    environment:
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: ${DB_NAME}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  # 2. BACKEND (FastAPI)
  backend:
    build:
      context: .
      dockerfile: ./backend/Dockerfile
    container_name: fastapi_container
    restart: always
    environment:
      # Construcción dinámica de la URL usando las variables del .env
      - DATABASE_URL=postgresql://${DB_USER}:${DB_PASSWORD}@postgres_db:5432/${DB_NAME}
      - AI_KEY=${AI_KEY}
    ports:
      - "8000:8000"
    depends_on:
      - postgres_db

  # 3. FRONTEND (Vue + Nginx)
  nginx:
    build:
      context: .
      dockerfile: ./frontend/Dockerfile
    container_name: nginx_frontend_container
    restart: always
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - backend

volumes:
  postgres_data: